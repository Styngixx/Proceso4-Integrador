# Nombre único para Eureka
spring.application.name=MicroServicio

# Puerto 8083 para que no choque con MicroConsumo (8082)
server.port=8083

# Configuración de base de datos H2 (en memoria)
spring.datasource.url=jdbc:h2:mem:ServicioBD
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

# Registro en el servidor Eureka (puerto 8761)
eureka.client.service-url.default-zone=http://localhost:8761/eureka

